<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Analyzer — MDRACING</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <style>
    /* ── Video Analyzer ── */
    .va-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .va-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .va-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 32px; letter-spacing: -.3px; color: var(--ad-text); margin: 0; }
    .va-back { color: var(--ad-text2); font-size: 14px; text-decoration: none; padding: 8px 14px; border: 1px solid var(--ad-border); border-radius: 8px; transition: all .2s; }
    .va-back:hover { background: var(--ad-card); color: var(--ad-red); border-color: var(--ad-red); }

    .va-card { background: var(--ad-card); border-radius: var(--ad-radius-l); padding: 24px; margin-bottom: 20px; border: 1px solid var(--ad-border); }
    .va-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--ad-text); }

    .va-form-row { display: flex; gap: 12px; margin-bottom: 14px; }
    .va-form-row > * { flex: 1; }
    .va-input, .va-textarea {
      width: 100%; padding: 11px 14px; border: 1px solid var(--ad-border);
      border-radius: 8px; font-family: inherit; font-size: 14px; background: #fff;
      color: var(--ad-text); transition: border-color .2s;
    }
    .va-input:focus, .va-textarea:focus { outline: none; border-color: var(--ad-red); }
    .va-label { display: block; font-size: 12px; font-weight: 600; color: var(--ad-text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }

    .va-checks { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; margin: 8px 0 16px; }
    .va-check { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid var(--ad-border); border-radius: 8px; cursor: pointer; transition: all .15s; user-select: none; }
    .va-check:hover { border-color: var(--ad-red); }
    .va-check input { margin-top: 2px; accent-color: var(--ad-red); cursor: pointer; }
    .va-check-text { flex: 1; }
    .va-check-name { font-size: 13.5px; font-weight: 600; color: var(--ad-text); }
    .va-check-desc { font-size: 11.5px; color: var(--ad-text3); margin-top: 1px; line-height: 1.4; }
    .va-check.active { border-color: var(--ad-red); background: rgba(209,0,0,.04); }

    .va-btn {
      padding: 12px 22px; border: none; border-radius: 8px; font-family: inherit;
      font-weight: 700; font-size: 13.5px; letter-spacing: .3px; cursor: pointer;
      transition: all .2s; display: inline-flex; align-items: center; gap: 8px;
      text-transform: uppercase;
    }
    .va-btn-primary { background: var(--ad-red); color: #fff; }
    .va-btn-primary:hover { background: var(--ad-red2); transform: translateY(-1px); }
    .va-btn-primary:disabled { background: #c8c8ce; cursor: not-allowed; transform: none; }
    .va-btn-secondary { background: #fff; color: var(--ad-text); border: 1px solid var(--ad-border); }
    .va-btn-secondary:hover { border-color: var(--ad-red); color: var(--ad-red); }

    .va-msg { padding: 12px 14px; border-radius: 8px; font-size: 13.5px; margin-bottom: 12px; display: none; }
    .va-msg.show { display: block; }
    .va-msg.success { background: #e6f7ec; color: var(--ad-green); border: 1px solid rgba(34,163,94,.2); }
    .va-msg.error { background: #fee; color: var(--ad-red); border: 1px solid rgba(209,0,0,.2); }
    .va-msg.info { background: #e8f0ff; color: var(--ad-blue); border: 1px solid rgba(37,99,235,.2); }

    /* Lista de jobs */
    .va-jobs-grid { display: grid; gap: 12px; }
    .va-job {
      display: grid; grid-template-columns: auto 1fr auto auto; gap: 14px;
      align-items: center; padding: 14px 16px; background: var(--ad-card);
      border: 1px solid var(--ad-border); border-radius: 10px; cursor: pointer;
      transition: all .15s;
    }
    .va-job:hover { border-color: var(--ad-red); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,.04); }
    .va-job-status {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .va-job-status.pending { background: #d4a020; animation: pulse 2s infinite; }
    .va-job-status.processing { background: #2563eb; animation: pulse 1s infinite; }
    .va-job-status.done { background: #22a35e; }
    .va-job-status.error { background: #d10000; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .va-job-info { min-width: 0; }
    .va-job-title { font-weight: 600; font-size: 14px; color: var(--ad-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .va-job-url { font-size: 12px; color: var(--ad-text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .va-job-meta { font-size: 11.5px; color: var(--ad-text2); white-space: nowrap; }
    .va-job-badge {
      font-size: 10.5px; padding: 4px 9px; border-radius: 12px; font-weight: 700;
      letter-spacing: .4px; text-transform: uppercase;
    }
    .va-job-badge.pending { background: rgba(212,160,32,.15); color: #b88810; }
    .va-job-badge.processing { background: rgba(37,99,235,.15); color: var(--ad-blue); }
    .va-job-badge.done { background: rgba(34,163,94,.15); color: var(--ad-green); }
    .va-job-badge.error { background: rgba(209,0,0,.15); color: var(--ad-red); }

    /* Modal detalle */
    .va-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .va-modal-backdrop.open { display: flex; }
    .va-modal {
      background: #fff; border-radius: 14px; max-width: 900px; width: 100%;
      max-height: 90vh; overflow-y: auto; padding: 28px; position: relative;
    }
    .va-modal-close {
      position: absolute; top: 14px; right: 14px; width: 36px; height: 36px;
      border: none; background: #f4f5f8; border-radius: 50%; cursor: pointer;
      font-size: 22px; color: var(--ad-text2); display: flex; align-items: center; justify-content: center;
    }
    .va-modal-close:hover { background: var(--ad-red); color: #fff; }
    .va-modal h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; margin: 0 0 6px; color: var(--ad-text); padding-right: 40px; }
    .va-modal-url { font-size: 12px; color: var(--ad-text3); margin-bottom: 16px; word-break: break-all; }
    .va-modal-url a { color: var(--ad-blue); text-decoration: none; }
    .va-section { margin: 20px 0; padding-bottom: 18px; border-bottom: 1px solid var(--ad-border-s); }
    .va-section:last-child { border-bottom: none; }
    .va-section h4 {
      font-size: 13px; font-weight: 700; color: var(--ad-red); margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .8px;
    }
    .va-section-body {
      font-size: 14px; line-height: 1.65; color: var(--ad-text);
      white-space: pre-wrap; word-wrap: break-word;
    }
    .va-section-body pre { background: #f4f5f8; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12.5px; }
    .va-copy-btn {
      float: right; font-size: 11px; padding: 4px 10px; border: 1px solid var(--ad-border);
      background: #fff; border-radius: 6px; cursor: pointer; color: var(--ad-text2);
    }
    .va-copy-btn:hover { border-color: var(--ad-red); color: var(--ad-red); }
    .va-empty { text-align: center; padding: 60px 20px; color: var(--ad-text3); font-size: 14px; }
    .va-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="va-wrap">
  <div class="va-header">
    <h1 class="va-title">🎬 Video Analyzer</h1>
    <a href="/admin" class="va-back">← Panel admin</a>
  </div>

  <!-- Form: agregar video -->
  <div class="va-card">
    <h2>Analizar nuevo video</h2>
    <div id="va-msg" class="va-msg"></div>

    <label class="va-label" for="va-url">URL del video (YouTube, TikTok, Instagram Reel)</label>
    <div class="va-form-row">
      <input type="url" id="va-url" class="va-input" placeholder="https://www.instagram.com/reel/..." />
    </div>

    <label class="va-label" for="va-title">Nota interna (opcional) — solo para identificarlo en tu lista</label>
    <div class="va-form-row">
      <input type="text" id="va-title" class="va-input" placeholder="Ej: 'el de instalación' — no se usa en el análisis" maxlength="200" />
    </div>

    <label class="va-label">¿Qué querés que genere?</label>
    <div class="va-checks" id="va-checks">
      <!-- Generadas por JS -->
    </div>

    <button id="va-submit" class="va-btn va-btn-primary">
      <span id="va-submit-text">Analizar video →</span>
    </button>
  </div>

  <!-- Lista de jobs -->
  <div class="va-card">
    <h2 style="display:flex;align-items:center;gap:8px;justify-content:space-between">
      Videos analizados
      <button id="va-refresh" class="va-btn va-btn-secondary" style="font-size:11px;padding:6px 12px">↻ Actualizar</button>
    </h2>
    <div id="va-jobs" class="va-jobs-grid">
      <div class="va-empty">Cargando…</div>
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="va-modal-backdrop" id="va-modal" onclick="if(event.target===this)closeModal()">
  <div class="va-modal" id="va-modal-content">
    <button class="va-modal-close" onclick="closeModal()">×</button>
    <div id="va-modal-body"></div>
  </div>
</div>

<script>
const API = '/api/video';

const OPTIONS = [
  { key: 'summary',              name: 'Resumen', desc: 'Resumen de 2-3 oraciones del video.' },
  { key: 'transcript_clean',     name: 'Transcripción limpia', desc: 'Texto con puntuación y formato.' },
  { key: 'subtitles',            name: 'Subtítulos (SRT)', desc: 'Timestampeados para CapCut/InShot.' },
  { key: 'structure_analysis',   name: 'Análisis de estructura', desc: 'Hook, retención, payoff, CTA + score.' },
  { key: 'hook_variants',        name: '3 variantes de hook', desc: 'Indignación / curiosidad / autoridad.' },
  { key: 'mdracing_adaptation',  name: 'Guiones MDRACING', desc: '2-3 adaptaciones al estilo MDRACING.' },
  { key: 'caption_ig',           name: 'Caption Instagram', desc: 'Versión corta + larga.' },
  { key: 'hashtags',             name: 'Hashtags', desc: '10-15 hashtags del rubro automotor.' },
];

// ─── Build checkboxes ───
const checksWrap = document.getElementById('va-checks');
checksWrap.innerHTML = OPTIONS.map(opt => `
  <label class="va-check">
    <input type="checkbox" value="${opt.key}" />
    <div class="va-check-text">
      <div class="va-check-name">${opt.name}</div>
      <div class="va-check-desc">${opt.desc}</div>
    </div>
  </label>
`).join('');

// Default checks
['summary', 'structure_analysis', 'mdracing_adaptation', 'caption_ig'].forEach(k => {
  const el = checksWrap.querySelector(`input[value="${k}"]`);
  if (el) {
    el.checked = true;
    el.closest('.va-check').classList.add('active');
  }
});

checksWrap.addEventListener('change', (e) => {
  const cb = e.target;
  if (cb.tagName === 'INPUT') {
    cb.closest('.va-check').classList.toggle('active', cb.checked);
  }
});

// ─── Helpers ───
function showMsg(text, type = 'info') {
  const el = document.getElementById('va-msg');
  el.className = 'va-msg show ' + type;
  el.textContent = text;
  if (type === 'success') setTimeout(() => el.classList.remove('show'), 5000);
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('es-AR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function fmtDuration(sec) {
  if (!sec) return '';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function shortUrl(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    return u.hostname.replace(/^www\./, '') + u.pathname.slice(0, 30) + (u.pathname.length > 30 ? '…' : '');
  } catch { return url.slice(0, 60); }
}

// ─── Submit form ───
const submitBtn = document.getElementById('va-submit');
const submitText = document.getElementById('va-submit-text');

submitBtn.addEventListener('click', async () => {
  const url = document.getElementById('va-url').value.trim();
  const title = document.getElementById('va-title').value.trim();
  if (!url) { showMsg('Pegá una URL válida', 'error'); return; }

  const options = {};
  checksWrap.querySelectorAll('input:checked').forEach(cb => { options[cb.value] = true; });
  if (Object.keys(options).length === 0) options.summary = true;

  submitBtn.disabled = true;
  submitText.innerHTML = '<span class="va-spinner"></span> Encolando…';

  try {
    const res = await fetch(`${API}?action=create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_url: url, title, options }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'Error');

    showMsg('✓ Video encolado. Va a aparecer abajo y se procesa en background.', 'success');
    document.getElementById('va-url').value = '';
    document.getElementById('va-title').value = '';
    await loadJobs();
  } catch (e) {
    showMsg('Error: ' + e.message, 'error');
  } finally {
    submitBtn.disabled = false;
    submitText.textContent = 'Analizar video →';
  }
});

// ─── Cargar jobs ───
async function loadJobs() {
  const wrap = document.getElementById('va-jobs');
  try {
    const res = await fetch(`${API}?action=list`);
    if (res.status === 401) {
      wrap.innerHTML = '<div class="va-empty">Sesión expirada. <a href="/admin" style="color:var(--ad-red)">Volvé al login</a>.</div>';
      return;
    }
    const data = await res.json();
    if (!data.ok || !data.jobs) {
      wrap.innerHTML = '<div class="va-empty">Error cargando: ' + (data.error || 'desconocido') + '</div>';
      return;
    }
    if (data.jobs.length === 0) {
      wrap.innerHTML = '<div class="va-empty">Todavía no analizaste ningún video.</div>';
      return;
    }
    wrap.innerHTML = data.jobs.map(j => `
      <div class="va-job" onclick="openJob('${j.id}')">
        <div class="va-job-status ${j.status}"></div>
        <div class="va-job-info">
          <div class="va-job-title">${escapeHtml(j.title || 'Sin título')}</div>
          <div class="va-job-url">${escapeHtml(shortUrl(j.source_url))}</div>
        </div>
        <div class="va-job-meta">${fmtDate(j.created_at)}${j.duration_sec ? ' · ' + fmtDuration(j.duration_sec) : ''}</div>
        <span class="va-job-badge ${j.status}">${labelStatus(j.status)}</span>
      </div>
    `).join('');
  } catch (e) {
    wrap.innerHTML = '<div class="va-empty">Error: ' + e.message + '</div>';
  }
}

function labelStatus(s) {
  return { pending: 'Pendiente', processing: 'Procesando', done: 'Listo', error: 'Error' }[s] || s;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m]);
}

document.getElementById('va-refresh').addEventListener('click', loadJobs);

// Auto-refresh cada 30s (para ver cuando los jobs terminan)
setInterval(loadJobs, 30000);
loadJobs();

// ─── Modal de detalle ───
async function openJob(id) {
  const modal = document.getElementById('va-modal');
  const body = document.getElementById('va-modal-body');
  body.innerHTML = '<div class="va-empty">Cargando…</div>';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res = await fetch(`${API}?action=get&id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (!data.ok || !data.job) {
      body.innerHTML = '<div class="va-empty">Error: ' + (data.error || 'no encontrado') + '</div>';
      return;
    }
    body.innerHTML = renderJobDetail(data.job);
  } catch (e) {
    body.innerHTML = '<div class="va-empty">Error: ' + e.message + '</div>';
  }
}

function closeModal() {
  document.getElementById('va-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function copyText(btnEl, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btnEl.textContent;
    btnEl.textContent = '✓ Copiado';
    setTimeout(() => btnEl.textContent = orig, 1500);
  });
}

function section(title, content, copyContent) {
  if (!content) return '';
  const copyBtn = copyContent ? `<button class="va-copy-btn" onclick="copyText(this, ${JSON.stringify(copyContent).replace(/"/g, '&quot;')})">Copiar</button>` : '';
  return `<div class="va-section"><h4>${title} ${copyBtn}</h4><div class="va-section-body">${content}</div></div>`;
}

function renderJobDetail(job) {
  const a = job.analysis || {};
  const parts = [];

  parts.push(`<h3>${escapeHtml(job.title || 'Video sin título')}</h3>`);
  parts.push(`<div class="va-modal-url">📎 <a href="${escapeHtml(job.source_url)}" target="_blank" rel="noopener">${escapeHtml(job.source_url)}</a></div>`);

  if (job.status === 'error') {
    parts.push(`<div class="va-msg show error">Error: ${escapeHtml(job.error_message || 'desconocido')}</div>`);
  }
  if (job.status === 'pending') {
    parts.push(`<div class="va-msg show info">⏳ Pendiente. El cron procesa cada 5 minutos.</div>`);
  }
  if (job.status === 'processing') {
    parts.push(`<div class="va-msg show info">⚙️ Procesando ahora. Refrescá en 1 minuto.</div>`);
  }

  // Helper: chequea si una sección está marcada como unavailable
  function isUnavailable(v) {
    return v && typeof v === 'object' && v.unavailable === true;
  }
  function renderUnavailable(v) {
    const reason = (v && v.reason) ? escapeHtml(v.reason) : 'Requiere transcripción del audio que no pudimos extraer';
    return `<div style="color:var(--ad-text3);font-style:italic;font-size:13px">⚠️ No disponible — ${reason}</div>`;
  }

  // Summary
  if (a.summary) {
    if (isUnavailable(a.summary)) parts.push(section('Resumen', renderUnavailable(a.summary)));
    else parts.push(section('Resumen', escapeHtml(a.summary), typeof a.summary === 'string' ? a.summary : ''));
  }

  // Structure
  if (a.structure_analysis) {
    if (isUnavailable(a.structure_analysis)) {
      parts.push(section('Análisis de estructura', renderUnavailable(a.structure_analysis)));
    } else {
      const s = a.structure_analysis;
      let html = '';
      if (s.score) html += `<strong>Score: ${s.score}/10</strong><br><br>`;
      if (s.hook) html += `<strong>Hook:</strong> ${escapeHtml(s.hook)}<br>`;
      if (s.retention) html += `<strong>Retención:</strong> ${escapeHtml(s.retention)}<br>`;
      if (s.payoff) html += `<strong>Payoff:</strong> ${escapeHtml(s.payoff)}<br>`;
      if (s.cta) html += `<strong>CTA:</strong> ${escapeHtml(s.cta)}<br>`;
      if (s.strengths && s.strengths.length) html += `<br><strong>Fortalezas:</strong><br>• ${s.strengths.map(escapeHtml).join('<br>• ')}`;
      if (s.weaknesses && s.weaknesses.length) html += `<br><strong>Debilidades:</strong><br>• ${s.weaknesses.map(escapeHtml).join('<br>• ')}`;
      parts.push(section('Análisis de estructura', html));
    }
  }

  // Hook variants
  if (a.hook_variants && a.hook_variants.length) {
    const html = a.hook_variants.map(h => `<strong>${escapeHtml(h.type||'')}:</strong> "${escapeHtml(h.text||'')}"`).join('<br><br>');
    parts.push(section('3 variantes de hook', html));
  }

  // MDRACING adaptations
  if (a.mdracing_adaptation && a.mdracing_adaptation.length) {
    a.mdracing_adaptation.forEach((adapt, i) => {
      let html = '';
      if (adapt.angle) html += `<strong>Producto:</strong> ${escapeHtml(adapt.angle)}<br>`;
      if (adapt.estimated_duration) html += `<strong>Duración:</strong> ${escapeHtml(adapt.estimated_duration)}<br><br>`;
      if (adapt.script) html += escapeHtml(adapt.script);
      parts.push(section(`Adaptación MDRACING #${i+1}${adapt.title ? ' — ' + escapeHtml(adapt.title) : ''}`, html, adapt.script));
    });
  }

  // Caption IG
  if (a.caption_ig) {
    let html = '';
    if (a.caption_ig.short) html += `<strong>Corto:</strong><br>${escapeHtml(a.caption_ig.short)}<br><br>`;
    if (a.caption_ig.long) html += `<strong>Largo:</strong><br>${escapeHtml(a.caption_ig.long)}`;
    parts.push(section('Caption Instagram', html, a.caption_ig.long || a.caption_ig.short));
  }

  // Hashtags
  if (a.hashtags && a.hashtags.length) {
    const tagText = a.hashtags.map(t => t.startsWith('#') ? t : '#' + t).join(' ');
    parts.push(section('Hashtags', escapeHtml(tagText), tagText));
  }

  // Transcript clean
  if (a.transcript_clean) {
    if (isUnavailable(a.transcript_clean)) parts.push(section('Transcripción limpia', renderUnavailable(a.transcript_clean)));
    else parts.push(section('Transcripción limpia', escapeHtml(a.transcript_clean), a.transcript_clean));
  }

  // Subtitles (SRT)
  if (a.subtitles) {
    if (isUnavailable(a.subtitles)) parts.push(section('Subtítulos (SRT)', renderUnavailable(a.subtitles)));
    else parts.push(section('Subtítulos (SRT)', `<pre>${escapeHtml(a.subtitles)}</pre>`, a.subtitles));
  }

  // Raw transcript (siempre que esté disponible)
  if (job.transcript && !a.transcript_clean) {
    parts.push(section('Transcripción (cruda)', escapeHtml(job.transcript), job.transcript));
  }

  if (parts.length <= 2) {
    parts.push('<div class="va-empty">Sin contenido todavía.</div>');
  }

  return parts.join('');
}
</script>

</body>
</html>
